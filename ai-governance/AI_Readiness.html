<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Readiness</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F4F6FA;color:#1a1a1a;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
#topbar{background:#1F3864;color:#fff;padding:14px 28px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
#topbar-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
#topbar-title span{color:#7BB4E0;font-weight:400}
#topbar-sub{margin-left:auto;font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.05em}
#tabbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;display:flex;justify-content:center;gap:0;overflow-x:auto;white-space:nowrap}
.tab-btn{padding:14px 16px;border:none;background:transparent;font-size:12px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;margin-right:2px;border-bottom:3px solid transparent;color:#666;font-weight:400;transition:color .15s;white-space:nowrap;cursor:pointer}
.tab-btn.active{font-weight:700}
.tab-btn .sub{font-size:10px;color:#999;font-weight:400}
#content{padding:24px 40px;max-width:1800px;margin:0 auto;width:100%}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search-input{flex:1;min-width:200px;padding:6px 12px;border-radius:6px;border:1px solid #D1D5DB;font-size:13px;outline:none;background:#FAFAFA}
.pill{padding:4px 11px;border-radius:20px;border:none;font-size:12px;font-weight:600;background:#F3F4F6;color:#555;cursor:pointer;transition:all .15s}
.pill.active{color:#fff}
.note{font-size:11px;color:#999;margin-bottom:10px}
.section-hdr{color:#fff;padding:9px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-count{margin-left:auto;background:rgba(255,255,255,.18);border-radius:10px;padding:1px 8px;font-size:11px}
.table-wrap{border:1px solid #D1D9E8;border-radius:10px;overflow:hidden}
.col-hdr{display:grid;background:#1F3864;color:#fff}
.col-hdr div{padding:10px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border-right:1px solid rgba(255,255,255,.12)}
.col-hdr div:last-child{border-right:none}
.data-row{cursor:pointer;border-top:1px solid #E8ECF3;display:grid}
.data-row:hover{filter:brightness(.97)}
.expand-panel{display:none;padding:14px 16px}
.expand-panel.open{display:block}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.mono{font-family:monospace}
.chicklets{display:flex;gap:10px;margin-top:10px}
.chicklet{flex:1;border-radius:8px;padding:10px 12px}
.chicklet-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.chicklet-item{font-size:11px;color:#333;line-height:1.5;padding-left:12px;position:relative;margin-bottom:3px}
.chicklet-item::before{content:"›";position:absolute;left:0;font-weight:700}
.comp-box{background:#FFFBEA;border:1.5px solid #D4A017;border-radius:8px;padding:12px 14px;margin-bottom:10px}
.comp-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:#92650A;margin-bottom:8px}
.comp-body{font-size:12px;color:#333;line-height:1.75}
.rem-label{font-size:9px;font-weight:800;letter-spacing:.1em;padding:1px 6px;border-radius:3px;display:inline-block;margin-bottom:3px}
.rem-body{font-size:12px;color:#222;line-height:1.65;margin-bottom:8px}
.phase-sel{display:flex;border-radius:10px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:28px}
.phase-btn{flex:1;padding:10px 4px;border:none;background:#F9FAFB;color:#555;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;border-right:1px solid #E5E7EB;cursor:pointer}
.phase-btn:last-child{border-right:none}
.phase-btn.active{color:#fff;font-weight:700}
.phase-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
.phase-hdr{border-radius:10px;padding:20px 24px;color:#fff;margin-bottom:16px}
.action-item{display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:#FAFAFA;border-radius:7px;border:1px solid #F0F0F0;margin-bottom:8px;font-size:13px;color:#333;line-height:1.6}
.action-num{min-width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.del-tag{display:inline-block;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;margin:4px;background:#fff}
.success-box{margin-top:16px;padding:12px 16px;background:#F0FDF4;border-radius:8px;border:1px solid #BBF7D0;font-size:13px;color:#166534}
.sidebar-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px;margin-bottom:14px}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:10px}
.ctrl-badge{display:inline-block;font-family:monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;margin:2px}
.timeline-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.timeline-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tier-hdr{border-radius:10px 10px 0 0;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px}
.tier-tbl{border:1px solid #E5E7EB;border-top:none;border-radius:0 0 10px 10px;overflow:auto;margin-bottom:28px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1F3864;color:#fff;padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
td{padding:10px 10px;border-bottom:1px solid #F0F0F0;vertical-align:top}
tr.even td{background:#FAFAFA}
tr.detail-row td{padding:0}
.detail-panel{background:#F0F5FF;border:2px solid #4472C4;border-radius:10px;padding:20px;margin:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:14px}
.detail-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:8px}
.ctrl-sub{font-size:9px;color:#888;max-width:120px;line-height:1.3;margin-top:1px}
.cov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.cov-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px}
.cov-pct{font-size:30px;font-weight:800;line-height:1}
.cov-bar-bg{height:5px;background:#F0F0F0;border-radius:3px;margin:10px 0;overflow:hidden}
.cov-bar-fill{height:100%;border-radius:3px}
.owasp-hdr{border-radius:10px;color:#fff;padding:16px 20px;margin-bottom:16px}
.owasp-col-hdr{display:grid;color:#fff}
.owasp-col-hdr div{padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border-right:1px solid rgba(255,255,255,.1)}
.owasp-row{cursor:pointer;border-top:1px solid #F0F0F0;display:grid}
.owasp-expand{padding:16px;display:none}
.owasp-expand.open{display:block}
.owasp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.ctrl-footer{display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid #ddd;align-items:center}
.client-box{font-size:12px;color:#1E8449;font-weight:600;line-height:1.7;background:#E8F5E9;padding:10px 12px;border-radius:7px;border:1px solid #A9DFBF}
.del-hdr{background:#1A5276;color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px}
.del-col-hdr{display:grid;background:#F8FAFF;border-left:1px solid #E5E7EB;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB}
.del-col-hdr div{padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;border-right:1px solid #E8ECF3}
.del-row{cursor:pointer;display:grid;border-top:1px solid #F0F0F0}
.del-expand{padding:16px;display:none}
.del-expand.open{display:block}
.info-box{margin-top:16px;padding:12px 16px;background:#FFF8E1;border:1px solid #F0D060;border-radius:8px;font-size:12px;color:#555;line-height:1.7}
.add-form{background:#F8FAFF;border:1px solid #C5D5F0;border-radius:10px;padding:20px;margin-bottom:20px;display:none}
.add-form.open{display:block}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.form-field label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:4px}
.form-field input,.form-field select{width:100%;padding:5px 8px;border-radius:5px;border:1px solid #D1D5DB;font-size:12px}
.cb-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
.cb-row label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.btn-primary{padding:7px 18px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn-sec{padding:7px 14px;background:#F3F4F6;color:#555;border:none;border-radius:6px;font-size:12px;cursor:pointer}
</style>
</head>

    rem:"ACTIVITY: Identify the appropriate internal role to own AI risk  -  typically CISO, CTO, Legal, or COO. Facilitate a leadership discussion to confirm scope, authority, and reporting line. For SMB clients without a suitable internal candidate, document the vCISO as interim AI Risk Owner in the engagement SOW.\n\nDELIVERABLE: AI Risk Owner Charter (Word .docx) defining role, authority, responsibilities, decision rights, and escalation path. Updated RACI matrix. Org chart annotation.\n\nEVIDENCE: Signed charter with CEO or CISO signature. RACI on file. Role referenced in AI AUP.",
    comp:"If no internal role can be formally designated, document the vCISO as interim AI Risk Owner in writing with defined scope and authority. Capture in the engagement SOW. Present to leadership for acknowledgment. Review at 6-month mark for internalization.",

    free:["Miro (free tier) for RACI","Google Sheets RACI template","Confluence RACI page"],
    platform:["Hyperproof","Vanta","Drata"] },

  { fn:"GOVERN", id:"GV-1.3", sub:"Org risk tolerance for AI defined", iso:"6.1.2 AI Risk Assessment / 6.1.3 Risk Treatment", priority:"HIGH",
    rem:"ACTIVITY: Facilitate a 90-minute risk tolerance workshop with CEO, CFO, and legal counsel. Present AI risk scenarios covering: data exposure via AI tools, hallucination in regulated outputs, third-party AI vendor failure, and deepfake-enabled fraud. Elicit acceptable vs. unacceptable risk positions for each scenario and document.\n\nDELIVERABLE: AI Risk Tolerance Statement (Word .docx) containing named scenarios, leadership positions, and approved risk appetite thresholds. Optionally a Risk Appetite Matrix (Excel/Sheets) scoring likelihood vs. impact.\n\nEVIDENCE: Signed risk tolerance statement with leadership approval. Workshop attendance record. Statement referenced in AI Risk Register.",
    comp:"If a formal workshop cannot be scheduled, circulate a one-page risk tolerance questionnaire to the CEO, CFO, and legal counsel. Compile responses into a draft tolerance statement and obtain email approval. Document as interim until a formal session can be held.",
    manual:["Risk tolerance statement (Word)","Workshop facilitation guide (PowerPoint)","Risk appetite matrix (Excel/Sheets)"],

  { fn:"GOVERN", id:"GV-1.4", sub:"Legal & regulatory requirements mapped", iso:"4.2 Interested Parties / 6.1.1 Context", priority:"HIGH",
    rem:"ACTIVITY: Interview legal counsel and review the client's jurisdictions, industries, and customer base to identify applicable AI regulatory obligations. Map each regulation to the AI systems in the inventory. Assign a compliance owner per obligation and flag upcoming deadlines.\n\nDELIVERABLE: Regulatory Obligation Register (Excel/Sheets) with columns for: regulation, jurisdiction, applicability trigger, specific obligation, cadence, control reference, compliance owner, evidence required, and current status.\n\nEVIDENCE: Completed register reviewed and signed off by Legal. Register linked from AI Risk Register. Updated when new regulations are enacted or client enters new markets.",
    comp:"If full regulatory mapping cannot be completed, apply a conservative default posture: treat all personal data as subject to PIPEDA, assume GDPR applies to any EU data subjects, and flag all AI systems touching regulated data for legal review before deployment. Document the assumption set in writing.",

  { fn:"GOVERN", id:"GV-1.5", sub:"AI procurement & vendor governance", iso:"8.4 Supplier Relationships / 8.5 External Processes", priority:"HIGH",
    rem:"ACTIVITY: Draft an AI vendor addendum clause library covering: data use prohibition for model training, data deletion timelines and confirmation, incident notification SLA (72 hours), audit rights, liability for AI-generated errors, and sub-processor AI disclosure. Build a procurement checklist of AI disclosure questions applied to every new vendor evaluation. Integrate both into the existing TPRA process.\n\nDELIVERABLE: Vendor AI Contract Addendum (Word .docx clause library). AI Procurement Checklist (Word/Excel). Updated TPRA questionnaire with AI section.\n\nEVIDENCE: Addendum in use in at least one active contract. Checklist applied to all new vendors since program launch. TPRA process documentation updated.",
    comp:"If a formal vendor AI addendum cannot be negotiated immediately, send a written AI disclosure request to each vendor and document their response. Treat non-response as a risk flag. Apply a manual hold on new AI-enabled vendor onboarding until the checklist process is in place.",

  { fn:"GOVERN", id:"GV-1.6", sub:"AI ethics principles documented", iso:"5.2 AI Policy (ethics) / 6.2 Objectives", priority:"MED",
    rem:"ACTIVITY: Facilitate a leadership session to define the organization's AI ethics principles. Draft a short-form principles document covering: fairness, transparency, accountability, privacy by design, and human oversight. Align each principle to the relevant ISO 42001 Annex A control. Publish internally and embed reference in the AI AUP.\n\nDELIVERABLE: AI Ethics Principles Statement (Word .docx, 1-2 pages). Annex A mapping table (Excel/Sheets) showing which controls support each principle.\n\nEVIDENCE: Published principles document with CEO endorsement. AUP references principles document. Annex A mapping on file.",

  { fn:"GOVERN", id:"GV-1.7", sub:"Transparency & disclosure obligations", iso:"7.4 Communication / 8.6 Use of AI Systems", priority:"HIGH",
    rem:"ACTIVITY: Conduct an AI decision inventory  -  interview department heads to identify every context where AI output influences a decision affecting an individual (employment, credit, customer service, healthcare, marketing profiling). Map each to the applicable regulatory disclosure obligation. Draft disclosure language for each context and implement in the relevant touchpoint. Define a human review process for high-stakes AI-assisted decisions.\n\nDELIVERABLE: AI Decision Inventory (Excel/Sheets register). Disclosure Language Templates (Word .docx)  -  one per context type. Human-in-the-Loop Review SOP (Word .docx) for regulated decisions.\n\nEVIDENCE: Inventory complete and signed off by Legal. Disclosure language deployed in at least one production touchpoint. Human review SOP published and staff briefed.",

  { fn:"GOVERN", id:"GV-2.1", sub:"AI Risk Register maintained", iso:"6.1.2 Risk Assessment / 9.1 Performance Evaluation", priority:"HIGH",
    rem:"ACTIVITY: Build the AI Risk Register from Phase 0 findings and the AI System Inventory. For each AI system, assess and document: risk description, risk category, likelihood, impact, risk tier, current controls, treatment decision, residual risk, owner, target date, and review date. Establish a quarterly review cadence with the AI Risk Owner.\n\nDELIVERABLE: AI Risk Register (Excel/Sheets) with all active AI risks populated, rated, and assigned. Quarterly review agenda template (Word).\n\nEVIDENCE: Populated register with dated entries. Quarterly review minutes on file. Register linked to board reporting template.",

    free:["Excel / Google Sheets (fully capable for SMB)","Airtable free tier","Notion database"],
    platform:["Hyperproof","LogicGate","Archer","Drata"] },

  { fn:"GOVERN", id:"GV-3.1", sub:"AI awareness & training program", iso:"7.2 Competence / 7.3 Awareness", priority:"HIGH",
    rem:"ACTIVITY: Design and deploy a tiered AI awareness training program. Tier 1 (all staff): AI basics, prompt hygiene, data handling rules, what not to share. Tier 2 (managers): identifying shadow AI, escalation paths. Tier 3 (developers): secure AI integration, prompt injection, API key hygiene. Tier 4 (executives): regulatory liability, board-level AI risk. Deliver live or record for async LMS deployment. Track completion.\n\nDELIVERABLE: Training decks per tier (PowerPoint). AI Quick Reference Card (PDF one-pager). Training Completion Log (Excel/Sheets). AI Phishing Simulation Brief and Debrief Template (Word).\n\nEVIDENCE: Completion log showing >85% per tier. Attendance records for live sessions. Phishing simulation results documented. Annual refresh on calendar.",
    comp:"If a formal training platform cannot be procured, deliver a vCISO-facilitated 30-minute AI awareness session for all staff. Capture attendance in a signed log. Distribute a one-page AI quick reference card. Document the session as the annual training record until a platform is in place.",
    manual:["Training content by tier (PowerPoint)","Completion tracking log (Excel/Sheets)","AI phishing sim debrief template (Word)"],
    free:["SANS Cyber Awareness free resources","NIST AI RMF Playbook","YouTube/internal LMS content"],
    platform:["KnowBe4","Proofpoint Security Awareness","SANS Security Awareness"] },

  { fn:"GOVERN", id:"GV-4.1", sub:"AI incident response planning", iso:"8.3 Incident Management / 10.1 Corrective Action", priority:"HIGH",
    rem:"ACTIVITY: Review the existing IR plan and draft an AI-specific addendum. Define response procedures for each AI incident type: data leakage via AI prompt, hallucination in regulated output, deepfake-enabled fraud, prompt injection in production AI, unauthorized AI tool deployment. Assign response leads, define escalation thresholds, and specify evidence preservation steps. Test via tabletop exercise within 90 days of completion.\n\nDELIVERABLE: AI IR Playbook Addendum (Word .docx) plugged into existing IR plan. AI Tabletop Exercise scenario pack (Word/PowerPoint). AI Incident Log (Excel/Sheets).\n\nEVIDENCE: Addendum signed off and version-controlled alongside main IR plan. Tabletop exercise completed with debrief report on file. IR plan review date updated.",

  { fn:"GOVERN", id:"GV-5.1", sub:"AI disclosure policy (external)", iso:"7.4 Communication / 9.3 Management Review", priority:"MED",
    comp:"If a formal external disclosure policy cannot be produced, add a brief AI use statement to existing privacy policy or website footer. Document the change and obtain legal sign-off. Flag for full standalone policy at next annual privacy review.",

  { fn:"MAP", id:"MP-3.5", sub:"AI system vulnerabilities identified", iso:"8.2.4 AI System Security / 6.1.2 Risk Assessment", priority:"HIGH",
    rem:"ACTIVITY: Define AI-specific test cases and add them to the scope of the next annual penetration test. Brief the pen test firm using the AI Pen Test Scope Brief covering OWASP LLM Top 10  -  specifically LLM01 (prompt injection), LLM02 (sensitive information disclosure), LLM07 (system prompt leakage), and LLM08 (RAG/vector weaknesses). For clients with customer-facing AI, consider a dedicated AI red team engagement. Review findings and map to NIST AI RMF controls.\n\nDELIVERABLE: AI Pen Test Scope Brief (Word .docx) handed to pen test firm. Pen test findings report with AI-specific section. Remediation tracking log (Excel) for findings.\n\nEVIDENCE: Scope brief issued prior to test. Pen test report with AI section on file. Findings tracked to remediation or accepted risk with documented rationale.",

  { fn:"MAP", id:"MP-4.1", sub:"Data lineage & provenance documented", iso:"8.2.3 Data for AI / 8.3 AI System Operation", priority:"MED",
    rem:"ACTIVITY: For each AI system in the inventory, document the origin and transformation history of data used for training or fine-tuning. For third-party AI services, send a written vendor data attestation request asking: is client data used for model training, what are the retention policies, who are the AI sub-processors. File responses as the provenance record and flag non-responding vendors.\n\nDELIVERABLE: Data Lineage Register (Excel/Sheets) per AI system. Vendor Training Data Attestation Request Letter (Word .docx template). Model Data Card (Word template) for any internally fine-tuned models.\n\nEVIDENCE: Lineage register populated for all Tier 1 systems. Vendor attestation responses on file. Non-responding vendors flagged as elevated risk in vendor tier matrix.",

  { fn:"MAP", id:"MP-5.1", sub:"AI threat modeling completed", iso:"6.1.2 Risk Assessment / 8.2.4 Security", priority:"MED",
    rem:"ACTIVITY: Include AI systems in the next threat modeling exercise. Use MITRE ATLAS or STRIDE adapted for AI to identify AI-specific threats per system: model inversion, membership inference, prompt injection, supply chain compromise of model weights, adversarial inputs. Document the top threats per system and map to existing controls. Identify control gaps.\n\nDELIVERABLE: Threat Model Document per AI system (Word .docx). MITRE ATLAS Mapping (Excel/Sheets) showing threat categories and control coverage. Control gap list fed into AI Risk Register.\n\nEVIDENCE: Threat model completed for all Critical and High-tier AI systems. ATLAS mapping on file. Identified gaps actioned in risk register.",

function fnOf(id){return id.startsWith('GV')?'GOVERN':id.startsWith('MP')?'MAP':id.startsWith('MS')?'MEASURE':'MANAGE'}

// DOM builder
function h(tag, props, ...kids) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === 'cls') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'style') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const kid of kids) {
    if (kid == null || kid === false) continue;
    el.appendChild(typeof kid === 'string' ? document.createTextNode(kid) : kid);
  }
  return el;
}
function txt(t){ return document.createTextNode(t); }
function bdg(text, color, bg) { return h('span',{cls:'badge',style:{color,background:bg}},text); }
function ctrlBdg(id) {
  const fn=fnOf(id), c=FN[fn];
  return h('span',{cls:'badge mono',style:{color:c.bg,background:c.lt},title:id+': '+(NIST_CTRL[id]||id)},id);
}
function isoBdg(id) {
  return h('span',{cls:'badge mono',style:{color:'#374151',background:'#F3F4F6'},title:'ISO 42001 §'+id+': '+(ISO_CTRL[id]||id)},'§'+id);
}

    br.appendChild(h('button',{cls:'btn-primary',onClick:()=>{
      toolList.push({...vals,dataTypes:vals.dataTypes.split(',').map(x=>x.trim()).filter(Boolean),controls:[],iso:[]});
      s.showAdd=false;render();
    }},'Add to Matrix'));
    br.appendChild(h('button',{cls:'btn-sec',onClick:()=>{s.showAdd=false;render();}},'Cancel'));
    form.appendChild(br);
    wrap.appendChild(form);
  }

  // filters
  const fb=h('div',{cls:'filter-bar'});
  const qi=h('input',{cls:'search-input',placeholder:'Search tools, controls, notes...',value:s.q,onInput:e=>{s.q=e.target.value;render();}});
  fb.appendChild(qi);
  ['ALL','Tier 1','Tier 2'].forEach(t=>{
    const b=h('button',{cls:'pill'+(s.tier===t?' active':''),onClick:()=>{s.tier=t;render();}},t);
    if(s.tier===t)b.style.background='#1F3864';
    fb.appendChild(b);
  });
  fb.appendChild(h('div',{style:{width:'1px',background:'#E5E7EB',height:'24px'}}));
  ['ALL','Approved','Conditional','Under Review','Not Approved'].forEach(st=>{
    const b=h('button',{cls:'pill'+(s.status===st?' active':''),onClick:()=>{s.status=st;render();}},st);
    if(s.status===st)b.style.background=STATUS_C[st]||'#333';
    fb.appendChild(b);
  });
  wrap.appendChild(fb);

  const filtered=toolList.filter(t=>{
    if(s.tier!=='ALL'&&t.tier!==s.tier)return false;
    if(s.status!=='ALL'&&t.status!==s.status)return false;
    if(s.q){const q=s.q.toLowerCase();if(![t.name,t.vendor,t.category,t.notes||'',...(t.controls||[])].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });

  // coverage calc
  const covTools=toolList.filter(t=>{
    if(s.tier!=='ALL'&&t.tier!==s.tier)return false;
    if(s.status!=='ALL'&&t.status!==s.status)return false;
    return true;
  });
  const cov={};
  covTools.forEach(t=>(t.controls||[]).forEach(c=>{if(!cov[c])cov[c]=[];cov[c].push(t.name);}));

  const tick=v=>v?'✓':' - ';
  const TICK_COLS=['dlp','sso','logging','dpa','soc2'];

  function tierBlock(tools,label,desc,color){
    const block=h('div',{});
    const th=h('div',{cls:'tier-hdr',style:{background:color}});
    const ti=h('div',{style:{flex:'1'}});
    ti.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'800',letterSpacing:'.04em'}},label));
    ti.appendChild(h('div',{style:{fontSize:'11px',opacity:'.8'}},desc));
    th.appendChild(ti);
    th.appendChild(h('div',{style:{background:'rgba(255,255,255,.18)',borderRadius:'8px',padding:'2px 10px',fontSize:'12px',fontWeight:'600'}},tools.length+' tools'));
    block.appendChild(th);
    if(!tools.length){block.appendChild(h('div',{style:{padding:'18px',background:'#FAFAFA',border:'1px solid #E5E7EB',borderTop:'none',borderRadius:'0 0 10px 10px',fontSize:'12px',color:'#999',fontStyle:'italic'}},'No tools match current filters.'));return block;}

    const COLS='minmax(140px,1.4fr) minmax(90px,.8fr) minmax(90px,.8fr) minmax(120px,1fr) 44px 44px 44px 44px 54px minmax(90px,.9fr) minmax(160px,1.6fr) minmax(110px,1fr) minmax(120px,1.1fr) 70px';

    const tw=h('div',{cls:'tier-tbl',style:{overflowX:'auto'}});

    // Column header row
    const hdr=h('div',{style:{display:'grid',gridTemplateColumns:COLS,background:'#1F3864',color:'#fff'}});
    ['Tool / Version','Vendor','Category','Data in Scope','DLP','SSO','Logs','DPA','SOC 2','EU AI Act','NIST Controls','ISO 42001','Status',''].forEach((col,i)=>{
      hdr.appendChild(h('div',{style:{padding:'9px 8px',fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',borderRight:i<13?'1px solid rgba(255,255,255,.1)':'none',whiteSpace:'nowrap'}},col));
    });
    tw.appendChild(hdr);

    tools.forEach((t,i)=>{
      const rid='tm-'+t.name.replace(/[^a-z0-9]/gi,'_');
      const isOpen=s.sel===rid;
      const sc=STATUS_C[t.status]||'#888';

      // Data row
      const row=h('div',{style:{display:'grid',gridTemplateColumns:COLS,background:isOpen?'#EEF4FF':i%2===0?'#fff':'#FAFAFA',borderTop:'1px solid #E8ECF3',cursor:'pointer'}});
      row.addEventListener('click',()=>{s.sel=isOpen?null:rid;render();});

      const cellStyle=(extra={})=>({padding:'10px 8px',borderRight:'1px solid #F0F0F0',fontSize:'12px',display:'flex',alignItems:'center',...extra});

      const c1=h('div',{style:cellStyle({fontWeight:'700',color:'#1F3864',whiteSpace:'nowrap'})},t.name);
      const c2=h('div',{style:cellStyle({color:'#555',whiteSpace:'nowrap'})},t.vendor);
      const c3=h('div',{style:cellStyle({})});
      c3.appendChild(h('span',{style:{fontSize:'11px',background:'#F0F0F0',padding:'2px 6px',borderRadius:'4px',color:'#444'}},t.category));
      const c4=h('div',{style:cellStyle({flexWrap:'wrap',gap:'3px'})});
      (t.dataTypes||[]).forEach(d=>c4.appendChild(h('span',{style:{fontSize:'10px',background:'#E5E7EB',padding:'1px 5px',borderRadius:'3px',color:'#444'}},d)));
      row.appendChild(c1);row.appendChild(c2);row.appendChild(c3);row.appendChild(c4);

      ['dlp','sso','logging','dpa','soc2'].forEach(f=>{
        row.appendChild(h('div',{style:{...cellStyle({justifyContent:'center',borderRight:'1px solid #F0F0F0'}),color:t[f]?'#1E8449':'#D5D5D5',fontWeight:t[f]?'700':'400',fontSize:'15px'}},t[f]?'✓':' - '));
      });

      row.appendChild(h('div',{style:cellStyle({fontSize:'10px',color:t.euAiAct&&t.euAiAct.includes('High')?'#C0392B':'#555',fontWeight:t.euAiAct&&t.euAiAct.includes('High')?'700':'400'})},t.euAiAct||''));

      const cNist=h('div',{style:cellStyle({flexWrap:'wrap',gap:'3px'})});
      (t.controls||[]).forEach(c=>cNist.appendChild(ctrlBdg(c)));
      row.appendChild(cNist);

      const cIso=h('div',{style:cellStyle({flexWrap:'wrap',gap:'3px'})});
      (t.iso||[]).forEach(c=>cIso.appendChild(isoBdg(c)));
      row.appendChild(cIso);

      row.appendChild(h('div',{style:cellStyle({})},h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#fff',background:sc,padding:'2px 8px',borderRadius:'10px',whiteSpace:'nowrap'}},t.status)));
      row.appendChild(h('div',{style:{...cellStyle({borderRight:'none'})}},h('span',{style:{fontSize:'11px',padding:'3px 8px',borderRadius:'4px',border:'1px solid #D1D5DB',background:'#fff',color:'#555'}},isOpen?'Close':'Details')));
      tw.appendChild(row);

      // Detail panel  -  full width div directly after this row
      if(isOpen){
        const dp=h('div',{style:{background:'#F0F5FF',borderTop:'2px solid #4472C4',borderBottom:'2px solid #4472C4',padding:'20px',width:'100%',boxSizing:'border-box'}});
        const dph=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}});
        const dpl=h('div',{});
        dpl.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'800',color:'#1F3864'}},t.name));
        dpl.appendChild(h('div',{style:{fontSize:'12px',color:'#666',marginTop:'2px'}},t.vendor+' · '+t.tier+' · '+t.category));
        dph.appendChild(dpl);
        dph.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#fff',background:sc,padding:'2px 8px',borderRadius:'10px'}},t.status));
        dp.appendChild(dph);
        const dg=h('div',{cls:'detail-grid'});

        const dc1=h('div',{});
        dc1.appendChild(h('div',{cls:'detail-title'},'NIST AI RMF Controls'));
        const cw=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
        if(!(t.controls||[]).length)cw.appendChild(h('span',{style:{fontSize:'12px',color:'#999'}},'No controls mapped'));
        (t.controls||[]).forEach(c=>{
          const cb=h('div',{});
          cb.appendChild(ctrlBdg(c));
          cb.appendChild(h('div',{cls:'ctrl-sub'},NIST_CTRL[c]||''));
          cw.appendChild(cb);
        });
        dc1.appendChild(cw); dg.appendChild(dc1);

        const dc2=h('div',{});
        dc2.appendChild(h('div',{cls:'detail-title'},'ISO/IEC 42001 Clauses'));
        const iw=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
        (t.iso||[]).forEach(c=>{
          const ib=h('div',{});
          ib.appendChild(isoBdg(c));
          ib.appendChild(h('div',{cls:'ctrl-sub'},ISO_CTRL[c]||''));
          iw.appendChild(ib);
        });
        dc2.appendChild(iw);
        dc2.appendChild(h('div',{cls:'detail-title',style:{marginTop:'14px'}},'EU AI Act'));
        dc2.appendChild(h('span',{style:{fontSize:'13px',color:t.euAiAct&&t.euAiAct.includes('High')?'#C0392B':'#555',fontWeight:t.euAiAct&&t.euAiAct.includes('High')?'700':'400'}},t.euAiAct||''));
        dg.appendChild(dc2);

        const dc3=h('div',{});
        dc3.appendChild(h('div',{cls:'detail-title'},'Notes'));
        dc3.appendChild(h('div',{style:{fontSize:'13px',color:'#333',lineHeight:'1.7'}},t.notes||''));
        dc3.appendChild(h('div',{cls:'detail-title',style:{marginTop:'14px'}},'Data in Scope'));
        const dw2=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}});
        (t.dataTypes||[]).forEach(d=>dw2.appendChild(h('span',{style:{fontSize:'12px',background:'#E5E7EB',padding:'3px 9px',borderRadius:'4px',color:'#374151'}},d)));
        dc3.appendChild(dw2);
        const flags=h('div',{style:{marginTop:'14px',display:'flex',gap:'16px',flexWrap:'wrap'}});
        [['DLP',t.dlp],['SSO',t.sso],['Logging',t.logging],['DPA',t.dpa],['SOC 2',t.soc2]].forEach(([l,v])=>{
          flags.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},
            h('span',{style:{fontSize:'14px',color:v?'#1E8449':'#D1D5DB',fontWeight:'700'}},v?'✓':'✗'),
            h('span',{style:{fontSize:'11px',color:v?'#1E8449':'#999',fontWeight:v?'600':'400'}},l)
          ));
        });
        dc3.appendChild(flags);
        dg.appendChild(dc3);
        dp.appendChild(dg);
        tw.appendChild(dp);
      }
    });

    block.appendChild(tw);
    return block;
  }

  if(s.tier==='ALL'||s.tier==='Tier 1') wrap.appendChild(tierBlock(filtered.filter(t=>t.tier==='Tier 1'),'Tier 1  -  Foundation LLMs','Base models and APIs your AI capabilities are built on.','#1F3864'));
  if(s.tier==='ALL'||s.tier==='Tier 2') wrap.appendChild(tierBlock(filtered.filter(t=>t.tier==='Tier 2'),'Tier 2  -  Applied AI Tools','Security platforms, copilots, productivity tools, and domain-specific AI.','#2E5F8A'));

  // coverage summary
  const covLabel=s.tier!=='ALL'?s.tier:s.status!=='ALL'?s.status+' tools':'Full Stack';
  wrap.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',letterSpacing:'.12em',textTransform:'uppercase',color:'#888',borderBottom:'1px solid #E5E7EB',paddingBottom:'8px',marginBottom:'16px'}},'Control Coverage  -  '+covLabel+' · '+covTools.length+' tools in scope'));
  const cg=h('div',{cls:'cov-grid'});
  ['GOVERN','MAP','MEASURE','MANAGE'].forEach(fn=>{
    const fc=FN[fn];
    const all=CROSSWALK.filter(r=>r.fn===fn);
    const done=all.filter(r=>cov[r.id]?.length>0);
    const pct=Math.round((done.length/all.length)*100);
    const card=h('div',{cls:'cov-card'});
    card.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',letterSpacing:'.08em',color:fc.bg,marginBottom:'4px'}},fn));
    const pctEl=h('div',{cls:'cov-pct',style:{color:fc.bg}});
    pctEl.innerHTML=pct+'<span style="font-size:16px">%</span>';
    card.appendChild(pctEl);
    card.appendChild(h('div',{style:{fontSize:'11px',color:'#888',marginBottom:'10px'}},done.length+' / '+all.length+' controls'));
    const bar=h('div',{cls:'cov-bar-bg'});
    bar.appendChild(h('div',{cls:'cov-bar-fill',style:{width:pct+'%',background:fc.bg}}));
    card.appendChild(bar);
    const bs=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'3px'}});
    done.slice(0,4).forEach(r=>bs.appendChild(h('span',{style:{fontFamily:'monospace',fontSize:'9px',color:fc.bg,background:fc.lt,padding:'1px 4px',borderRadius:'2px'}},r.id)));
    if(done.length>4)bs.appendChild(h('span',{style:{fontSize:'9px',color:'#888'}},'+' +(done.length-4)));
    card.appendChild(bs);
    cg.appendChild(card);
  });
  wrap.appendChild(cg);
  wrap.appendChild(h('div',{style:{fontSize:'11px',color:'#999',fontStyle:'italic',marginTop:'12px'}},'Tool coverage means a tool exists that can support the control  -  not that it is fully implemented.'));
  return wrap;
}

// ═══════════════════════════════════════════════════════
// OWASP TAB (shared factory)
// ═══════════════════════════════════════════════════════
function renderOWASP(dataset, bgColor, tabIdx) {
  const s=S[tabIdx]||(S[tabIdx]={sev:'ALL',q:''});
  const isLLM = tabIdx===3;
  const wrap=h('div',{});

  const hd=h('div',{cls:'owasp-hdr',style:{background:bgColor}});
  hd.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'800',marginBottom:'4px'}},
    isLLM?'OWASP Top 10 for LLM Applications  -  2025':'OWASP Top 10 for Agentic AI Applications  -  2026'));
  hd.appendChild(h('div',{style:{fontSize:'12px',opacity:'.8',lineHeight:'1.6'}},
    isLLM?'Definitive security risk framework for LLM applications. Applies to every client using AI.':'Released December 2025 at Black Hat Europe. Extends the LLM Top 10 for autonomous AI agents.'));
  wrap.appendChild(hd);

  const fb=h('div',{cls:'filter-bar'});
  const qi=h('input',{cls:'search-input',placeholder:'Search vulnerabilities, mitigations...',value:s.q,onInput:e=>{s.q=e.target.value;render();}});
  fb.appendChild(qi);
  ['ALL','Critical','High','Medium','Low'].forEach(sv=>{
    const b=h('button',{cls:'pill'+(s.sev===sv?' active':''),onClick:()=>{s.sev=sv;render();}},sv);
    if(s.sev===sv)b.style.background=SEV_C[sv]||bgColor;
    fb.appendChild(b);
  });
  wrap.appendChild(fb);

  const rows=dataset.filter(r=>{
    if(s.sev!=='ALL'&&r.severity!==s.sev)return false;
    if(s.q){const q=s.q.toLowerCase();if(![r.id,r.name,r.what,r.clientExample,...r.mitigations].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });

  const COL='90px 180px 130px 1fr 95px 85px';
  const ch=h('div',{cls:'owasp-col-hdr',style:{gridTemplateColumns:COL,background:bgColor,borderRadius:'8px 8px 0 0'}});
  ['ID','Risk','Category','Description'+(isLLM?'':' & Agent Context'),'Severity','Priority'].forEach(t=>ch.appendChild(h('div',{},t)));
  wrap.appendChild(ch);

  const tw=h('div',{style:{border:'1px solid #E5E7EB',borderTop:'none',borderRadius:'0 0 8px 8px',overflow:'hidden'}});
  rows.forEach((r,i)=>{
    const rid=(isLLM?'llm':'agi')+r.id, isOpen=expanded===rid;
    const bg=isOpen?'#F5EDF7':i%2===0?'#fff':'#F9FAFB';

    const row=h('div',{cls:'owasp-row',style:{gridTemplateColumns:COL,background:bg}});
    row.addEventListener('click',()=>{expanded=isOpen?null:rid;render();});
    row.appendChild(h('div',{style:{padding:'12px',borderRight:'1px solid #F0F0F0',fontFamily:'monospace',fontSize:'12px',fontWeight:'800',color:bgColor}},r.id));
    row.appendChild(h('div',{style:{padding:'12px',fontSize:'12px',fontWeight:'600',lineHeight:'1.4',borderRight:'1px solid #F0F0F0'}},r.name));
    const catd=h('div',{style:{padding:'12px',borderRight:'1px solid #F0F0F0'}});
    catd.appendChild(h('span',{style:{fontSize:'10px',background:isLLM?'#E5E7EB':'#EDE5F0',color:isLLM?'#444':'#4A1942',padding:'2px 7px',borderRadius:'4px',fontWeight:'600'}},r.category));
    row.appendChild(catd);
    const dd=h('div',{style:{padding:'12px',borderRight:'1px solid #F0F0F0'}});
    dd.appendChild(h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.6'}},r.what.length>150?r.what.slice(0,147)+'...':r.what));
    if(r.agentContext) dd.appendChild(h('div',{style:{marginTop:'5px',fontSize:'10px',color:bgColor,fontStyle:'italic',fontWeight:'600'}},'⚡ '+r.agentContext));
    row.appendChild(dd);
    const sd=h('div',{style:{padding:'12px 8px',borderRight:'1px solid #F0F0F0',display:'flex',alignItems:'flex-start',justifyContent:'center'}});
    sd.appendChild(bdg(r.severity,SEV_C[r.severity],SEV_BG[r.severity]));
    row.appendChild(sd);
    const pd=h('div',{style:{padding:'12px 8px',display:'flex',alignItems:'flex-start',justifyContent:'center'}});
    pd.appendChild(bdg(r.vcisoPriority,PRI_C[r.vcisoPriority],PRI_BG[r.vcisoPriority]));
    row.appendChild(pd);
    tw.appendChild(row);

    if(isOpen){
      const panel=h('div',{cls:'owasp-expand open',style:{background:'#F5EDF7',borderTop:'1px solid #DDD0E0'}});
      const pg=h('div',{cls:'owasp-grid'});

      const p1=h('div',{});
      p1.appendChild(h('div',{cls:'detail-title'},'Client Example'));
      p1.appendChild(h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.7',background:'#fff',padding:'10px 12px',borderRadius:'7px',border:'1px solid #DDD0E0',marginBottom:'10px'}},r.clientExample));
      if(r.realWorldRef){p1.appendChild(h('div',{cls:'detail-title'},'Real-World Reference'));p1.appendChild(h('div',{style:{fontSize:'11px',color:bgColor,fontStyle:'italic',lineHeight:'1.5'}},r.realWorldRef));}
      pg.appendChild(p1);

      const p2=h('div',{});
      p2.appendChild(h('div',{cls:'detail-title'},'Business Impact'));
      p2.appendChild(h('div',{style:{fontSize:'12px',color:'#C0392B',lineHeight:'1.7',marginBottom:'10px'}},r.businessImpact));
      if(r.agentContext){p2.appendChild(h('div',{cls:'detail-title'},'Agentic Context'));p2.appendChild(h('div',{style:{fontSize:'12px',color:bgColor,fontWeight:'600',lineHeight:'1.6',background:'#EDE5F0',padding:'8px 10px',borderRadius:'6px'}},r.agentContext));}
      else if(r.clientRelevance){p2.appendChild(h('div',{cls:'detail-title'},'Client Relevance'));p2.appendChild(h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.6',fontStyle:'italic'}},r.clientRelevance));}
      pg.appendChild(p2);

      const p3=h('div',{});
      p3.appendChild(h('div',{cls:'detail-title'},'Mitigations'));
      r.mitigations.forEach(m=>{
        const mi=h('div',{style:{display:'flex',gap:'6px',marginBottom:'5px'}});
        mi.appendChild(h('span',{style:{color:bgColor,fontWeight:'700',fontSize:'12px',minWidth:'10px'}},'›'));
        mi.appendChild(h('span',{style:{fontSize:'12px',color:'#333',lineHeight:'1.5'}},m));
        p3.appendChild(mi);
      });
      pg.appendChild(p3);
      panel.appendChild(pg);

      const cf=h('div',{cls:'ctrl-footer'});
      cf.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#555'}},'NIST AI RMF:'));
      (r.nistMap||[]).forEach(c=>cf.appendChild(ctrlBdg(c)));
      cf.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#555',marginLeft:'8px'}},'ISO 42001:'));
      (r.isoMap||[]).forEach(c=>cf.appendChild(isoBdg(c)));
      if(r.exploitability){
        const ef=h('div',{style:{marginLeft:'auto',display:'flex',gap:'8px'}});
        ef.appendChild(h('span',{style:{fontSize:'10px',color:'#888'}},'Exploitability:'));
        ef.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:r.exploitability==='High'?'#C0392B':r.exploitability==='Medium'?'#B7770D':'#2E6B4F'}},r.exploitability));
        ef.appendChild(h('span',{style:{fontSize:'10px',color:'#888',marginLeft:'8px'}},'Detectability:'));
        ef.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:r.detectability==='Low'||r.detectability==='Very Low'?'#C0392B':r.detectability==='Medium'?'#B7770D':'#2E6B4F'}},r.detectability));
        cf.appendChild(ef);
      }
      panel.appendChild(cf);
      tw.appendChild(panel);
    }
  });
  wrap.appendChild(tw);
  if(!isLLM) wrap.appendChild(h('div',{cls:'info-box'},'The OWASP LLM Top 10 still applies to all agentic systems  -  this list extends it. If your client deploys agents with tool access, code execution, or multi-agent pipelines, assess against both frameworks.'));
  return wrap;
}

// ═══════════════════════════════════════════════════════
// DELIVERABLE LIBRARY TAB
// ═══════════════════════════════════════════════════════
function renderDeliverables() {
  const s=S[5]||(S[5]={cat:'All',type:'All',phase:'All',q:''});
  const EFF_C={High:'#C0392B',Medium:'#B7770D',Low:'#1E8449'};
  const EFF_BG={High:'#FDECEA',Medium:'#FFF8E1',Low:'#E8F5E9'};
  const wrap=h('div',{});

  const hd=h('div',{cls:'del-hdr'});
  hd.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'800',marginBottom:'4px'}},'📁 AI Readiness Deliverable Library'));
  hd.appendChild(h('div',{style:{fontSize:'12px',opacity:'.85',lineHeight:'1.6'}},DELIVERABLES.length+' deliverables across 6 categories, each mapped to NIST AI RMF controls and ISO 42001 clauses.'));
  wrap.appendChild(hd);

  const fb1=h('div',{cls:'filter-bar'});
  const qi=h('input',{cls:'search-input',placeholder:'Search deliverables, controls, descriptions...',value:s.q,onInput:e=>{s.q=e.target.value;render();}});
  fb1.appendChild(qi);
  wrap.appendChild(fb1);

  const fb2=h('div',{cls:'filter-bar'});
  ['All','Policy & Standards','Registers & Trackers','Assessments & Checklists','Templates & SOPs','Awareness & Training','Program Governance'].forEach(c=>{
    const b=h('button',{cls:'pill'+(s.cat===c?' active':''),onClick:()=>{s.cat=c;render();}},c);
    if(s.cat===c)b.style.background=CAT_C[c]||'#1A5276';
    fb2.appendChild(b);
  });
  wrap.appendChild(fb2);

  const fb3=h('div',{cls:'filter-bar'});
  ['All','Phase 0','Phase 1','Phase 2','Phase 3','Phase 5'].forEach(p=>{
    const b=h('button',{cls:'pill'+(s.phase===p?' active':''),onClick:()=>{s.phase=p;render();}},p);
    if(s.phase===p)b.style.background='#1F3864';
    fb3.appendChild(b);
  });
  fb3.appendChild(h('div',{style:{width:'1px',background:'#E5E7EB',height:'24px'}}));
  ['Policy','Standard','Register','Tracker','Assessment','Checklist','Template','SOP','Awareness','Training'].forEach(t=>{
    const b=h('button',{cls:'pill'+(s.type===t?' active':''),onClick:()=>{s.type=s.type===t?'All':t;render();}},t);
    if(s.type===t)b.style.background=TYPE_COLORS[t]||'#555';
    fb3.appendChild(b);
  });
  wrap.appendChild(fb3);

  const filtered=DELIVERABLES.filter(d=>{
    if(s.cat!=='All'&&d.category!==s.cat)return false;
    if(s.type!=='All'&&d.type!==s.type)return false;
    if(s.phase!=='All'&&d.phase!==s.phase)return false;
    if(s.q){const q=s.q.toLowerCase();if(![d.id,d.name,d.description,d.whenToUse,d.clientValue,...d.controls].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });

  wrap.appendChild(h('div',{cls:'note'},filtered.length+' of '+DELIVERABLES.length+' deliverables · click any row to expand'));

  const grp={};
  filtered.forEach(d=>{if(!grp[d.category])grp[d.category]=[];grp[d.category].push(d);});
  const COL='90px 90px 200px 1fr 90px 75px';

  Object.entries(grp).forEach(([cat,docs])=>{
    const cc=CAT_C[cat]||'#555';
    const block=h('div',{style:{marginBottom:'24px'}});
    const ch=h('div',{style:{background:cc,color:'#fff',padding:'9px 16px',borderRadius:'8px 8px 0 0',display:'flex',alignItems:'center',gap:'10px',fontSize:'13px',fontWeight:'700'}});
    ch.appendChild(h('span',{},cat));
    ch.appendChild(h('span',{style:{marginLeft:'auto',background:'rgba(255,255,255,.18)',borderRadius:'10px',padding:'1px 8px',fontSize:'11px'}},String(docs.length)));
    block.appendChild(ch);

    const colH=h('div',{cls:'del-col-hdr',style:{gridTemplateColumns:COL}});
    ['ID','Type','Document Name','Description','Phase','Effort'].forEach(t=>colH.appendChild(h('div',{},t)));
    block.appendChild(colH);

    const iw=h('div',{style:{border:'1px solid #E5E7EB',borderTop:'none',borderRadius:'0 0 8px 8px',overflow:'hidden'}});
    docs.forEach((d,i)=>{
      const rid='del-'+d.id, isOpen=expanded===rid;
      const row=h('div',{cls:'del-row',style:{gridTemplateColumns:COL,background:isOpen?'#EEF3FA':i%2===0?'#fff':'#F9FAFB'}});
      row.addEventListener('click',()=>{expanded=isOpen?null:rid;render();});
      row.appendChild(h('div',{style:{padding:'11px 10px',borderRight:'1px solid #F0F0F0',fontFamily:'monospace',fontSize:'11px',fontWeight:'700',color:cc}},d.id));
      const tt=h('div',{style:{padding:'11px 10px',borderRight:'1px solid #F0F0F0'}});
      tt.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#fff',background:TYPE_COLORS[d.type]||'#555',padding:'2px 7px',borderRadius:'4px'}},d.type));
      row.appendChild(tt);
      row.appendChild(h('div',{style:{padding:'11px 10px',fontSize:'12px',fontWeight:'600',color:'#1a1a1a',lineHeight:'1.4',borderRight:'1px solid #F0F0F0'}},d.name));
      row.appendChild(h('div',{style:{padding:'11px 10px',fontSize:'12px',color:'#555',lineHeight:'1.5',borderRight:'1px solid #F0F0F0'}},d.description.length>140?d.description.slice(0,137)+'...':d.description));
      const ph=h('div',{style:{padding:'11px 8px',borderRight:'1px solid #F0F0F0',display:'flex',alignItems:'flex-start',justifyContent:'center'}});
      ph.appendChild(bdg(d.phase,'#2E5F8A','#E3EDF6'));
      row.appendChild(ph);
      const ef=h('div',{style:{padding:'11px 8px',display:'flex',alignItems:'flex-start',justifyContent:'center'}});
      ef.appendChild(bdg(d.effort,EFF_C[d.effort],EFF_BG[d.effort]));
      row.appendChild(ef);
      iw.appendChild(row);

      if(isOpen){
        const panel=h('div',{cls:'del-expand open',style:{background:'#EEF3FA',borderTop:'1px solid #D5E3F5'}});
        const pg=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'14px',marginBottom:'14px'}});

        const p1=h('div',{});
        p1.appendChild(h('div',{cls:'detail-title'},'Full Description'));
        p1.appendChild(h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.7',marginBottom:'10px'}},d.description));
        p1.appendChild(h('div',{cls:'detail-title'},'Format'));
        p1.appendChild(h('div',{style:{fontSize:'12px',color:'#2E5F8A',fontWeight:'600'}},d.format));
        pg.appendChild(p1);

        const p2=h('div',{});
        p2.appendChild(h('div',{cls:'detail-title'},'When to Use'));
        p2.appendChild(h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.7',marginBottom:'12px'}},d.whenToUse));
        p2.appendChild(h('div',{cls:'detail-title'},'Delivered By'));
        p2.appendChild(h('div',{style:{fontSize:'12px',color:'#555',lineHeight:'1.5',fontStyle:'italic'}},d.deliveredBy));
        pg.appendChild(p2);

        const p3=h('div',{});
        p3.appendChild(h('div',{cls:'detail-title'},'Client Value'));
        p3.appendChild(h('div',{cls:'client-box'},d.clientValue));
        pg.appendChild(p3);
        panel.appendChild(pg);

        const cf=h('div',{cls:'ctrl-footer'});
        cf.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#555'}},'NIST AI RMF:'));
        d.controls.forEach(c=>cf.appendChild(ctrlBdg(c)));
        cf.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#555',marginLeft:'8px'}},'ISO 42001:'));
        d.iso.forEach(c=>cf.appendChild(isoBdg(c)));
        panel.appendChild(cf);
        iw.appendChild(panel);
      }
    });
    block.appendChild(iw);
    wrap.appendChild(block);
  });
  if(!filtered.length) wrap.appendChild(h('div',{style:{textAlign:'center',padding:'48px',color:'#999'}},'No deliverables match your filters.'));
  return wrap;
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function render() {
  renderTabs();
  const content=document.getElementById('content');
  content.innerHTML='';
  const panels=[renderCrosswalk,renderPhased,renderToolMatrix,
    ()=>renderOWASP(OWASP_LLM,'#1F3864',3),
    ()=>renderOWASP(OWASP_AGENTIC,'#4A1942',4),
    renderDeliverables];
  content.appendChild(panels[activeTab]());
}

render();
</script>
</body>
</html>
